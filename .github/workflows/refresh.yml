name: Ugentlig opdatering af opkaldsliste

on:
  schedule:
    - cron: '0 6 * * 1'   # hver mandag kl. 06:00 UTC (~08:00 dansk tid)
  workflow_dispatch: {}    # tillad manuel kørsel

permissions:
  contents: write
  pages: write

concurrency:
  group: refresh-opkaldsliste
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Byg index.html fra Billy
        env:
          BILLY_TOKEN: ${{ secrets.BILLY_TOKEN }}
          BILLY_ORG_ID: ${{ secrets.BILLY_ORG_ID }}
          UNLOCK_PASSWORD: ${{ secrets.UNLOCK_PASSWORD }}
          MOBILEPAY: ${{ secrets.MOBILEPAY }}
          AGE_MONTHS: '2'
          WORKER_URL: ${{ secrets.WORKER_URL }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: node scripts/billy_refresh.js

      - name: Synk kontakt-maps til Worker (for auto-hold ved svar)
        env:
          BILLY_TOKEN: ${{ secrets.BILLY_TOKEN }}
          BILLY_ORG_ID: ${{ secrets.BILLY_ORG_ID }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: node scripts/push_maps.js

      - name: Commit og push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Ingen ændringer at committe."
          else
            git commit -m "Ugentlig opdatering: forfaldne fakturaer ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Udløs Pages-build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds" \
            && echo "Pages-build udløst" || echo "Pages-build kunne ikke udløses (springes over)"
